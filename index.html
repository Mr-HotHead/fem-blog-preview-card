<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | Blog preview card</title>
</head>

<body>

  <div aria-label="card" class="card">
    <img src="assets/images/illustration-article.svg"
      alt="the thumbnail of this card containing various shapes and designs primarily consisting of colors yellow, black and white"
      class="card-image">

    <h2 class="card-title"> HTML & CSS foundations</h2>

    <p class="card-type">Learning</p>

    <p class="card-date">Published 21 Dec 2023</p>

    <p class="card-body"> These languages are the backbone of every website, defining structure, content, and
      presentation.
    </p>

    <footer class="footer">
      <img class="card-author-image" src="assets/images/image-avatar.webp" alt="image of the author of this article">
      <p class="card-author-name">Greg Hooper</p>
    </footer>

  </div>


</body>

</html>
